name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"] # Деплоим каждый раз, когда пушим в master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # ВАЖНО: Убедись, что Vite собирает всё в папку 'dist'
          path: './dist'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
